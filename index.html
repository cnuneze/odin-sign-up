<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Logo Sidebar -->
      <aside>
        <div class="container-logo">
          <img src="./assets/odin-logo.png" alt="Odin Logo" class="logo" />
          <p>ODIN</p>
        </div>
        <p class="image-credits">
          Foto de
          <a
            href="https://unsplash.com/es/@haliewestphoto?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash"
            >Halie West</a
          >
          en
          <a
            href="https://unsplash.com/es/fotos/planta-de-hoja-verde-en-fotografia-de-primer-plano-25xggax4bSA?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash"
            >Unsplash</a
          >
        </p>
      </aside>

      <!-- Section Form -->
      <section class="main-content">
        <section class="form-head">
          <p>
            This is not a real service! You know you need something like this in
            your life to help you to realize you deepest dreams. <br />
            Sign up <i>now</i> to get started.
          </p>
          <p>You <i>know</i> you want to.</p>
        </section>
        <section class="form-body">
          <form action="#">
            <h1>Let's do this!</h1>
            <div class="form-container">
              <div class="form-input">
                <label for="txt-first-name">FIRST NAME</label>
                <input type="text" name="first-name" id="txt-first-name" />
              </div>
              <div class="form-input">
                <label for="txt-last-name">LAST NAME</label>
                <input type="text" name="last-name" id="txt-last-name" />
              </div>
              <div class="form-input">
                <label for="txt-email">EMAIL</label>
                <input type="text" name="email" id="txt-email" />
              </div>
              <div class="form-input">
                <label for="txt-phone">PHONE NUMBER</label>
                <input type="text" name="phone" id="txt-phone" />
              </div>
              <div class="form-input">
                <label for="txt-password">PASSWORD</label>
                <input type="text" name="password" id="txt-password" />
              </div>
              <div class="form-input">
                <label for="txt-password-confirm">CONFIRM PASSWORD</label>
                <input
                  type="text"
                  name="password-confirm"
                  id="txt-password-confirm"
                />
              </div>
            </div>
          </form>
        </section>
        <section style="background-color: green" class="form-action"></section>
      </section>
    </div>
  </body>
</html>
